name: FastAPI CI Pipeline

# 1. When should this action run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. What should the action do?
jobs:
  test:
    name: Run Pytest Suite
    # Spin up a temporary Ubuntu Linux machine
    runs-on: ubuntu-latest

    steps:
      # Step A: Download your code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Install Python on the machine
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Change this if you are using a different version locally

      # Step C: Install your app's dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio

      # Step D: Run the tests!
      - name: Execute Tests
        run: |
          pytest